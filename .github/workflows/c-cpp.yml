name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        packages: build-essential libgtk-3-dev
    - name: make
      run: make
    - name: make install
      run: make install
    - name: make uninstall
      run: make uninstall
